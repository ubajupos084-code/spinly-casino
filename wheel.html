<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Колесо фортуны — Spinly</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="header-slot"></div>

  <main class="container">
    <div class="wheel-page">
      <h1>Колесо фортуны</h1>
      <p class="lead">Бесплатное вращение раз в 24 часа. Удача гарантирована — выигрыш есть в каждом секторе.</p>

      <div class="wheel-container">
        <div class="wheel-pointer"></div>
        <div class="wheel" id="wheel"></div>
        <div class="wheel-labels" id="wheel-labels"></div>
        <div class="wheel-center"></div>
      </div>

      <button class="btn primary lg" id="spin-btn">Крутить колесо</button>
      <div class="wheel-status" id="status"></div>
      <div id="result-slot"></div>
    </div>
  </main>

  <div id="footer-slot"></div>
  <script src="sounds.js"></script>
  <script src="app.js"></script>
  <script>
    if (!requireAuth()) { /* redirects */ }

    const wheel = document.getElementById("wheel");
    const labels = document.getElementById("wheel-labels");
    const spinBtn = document.getElementById("spin-btn");
    const statusEl = document.getElementById("status");
    const resultSlot = document.getElementById("result-slot");

    // Render labels around the wheel
    function renderLabels() {
      labels.innerHTML = "";
      const radius = 140; // distance from center for label
      WHEEL_PRIZES.forEach((p, i) => {
        const angle = (i * 45) + 22.5;       // center of each segment
        const rad = (angle - 90) * Math.PI / 180;
        const x = Math.cos(rad) * radius;
        const y = Math.sin(rad) * radius;
        const el = document.createElement("div");
        el.className = "wheel-label";
        el.style.transform = `translate(${x}px, ${y}px) translate(-50%, -50%) rotate(${angle}deg)`;
        el.textContent = p.label;
        labels.appendChild(el);
      });
    }
    renderLabels();

    let currentRotation = 0;
    let countdownTimer = null;

    function fmtTimeLeft(ms) {
      const totalSec = Math.max(0, Math.floor(ms / 1000));
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    }

    function refreshStatus() {
      const status = canSpinWheel();
      if (status.ok) {
        statusEl.innerHTML = `Доступно: <span class="countdown">сейчас</span>`;
        spinBtn.disabled = false;
        if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
      } else {
        spinBtn.disabled = true;
        const tick = () => {
          const left = status.nextAt - Date.now();
          if (left <= 0) {
            refreshStatus();
          } else {
            statusEl.innerHTML = `Следующее вращение через <span class="countdown">${fmtTimeLeft(left)}</span>`;
          }
        };
        tick();
        if (countdownTimer) clearInterval(countdownTimer);
        countdownTimer = setInterval(tick, 1000);
      }
    }
    refreshStatus();

    spinBtn.addEventListener("click", () => {
      try {
        const { prize, index } = spinWheel();
        renderHeader(); flashBalance();
        spinBtn.disabled = true;
        resultSlot.innerHTML = "";

        // Animation: spin multiple turns + land on segment
        // Segment i center is at i*45 + 22.5 degrees from top, going clockwise
        // To land segment center under the pointer (top), wheel should rotate
        // so that the segment angle is at 0deg (top). Wheel rotation negative direction.
        const segmentCenter = index * 45 + 22.5;
        const baseTurns = 6 * 360;                  // 6 full turns
        const finalAngle = baseTurns + (360 - segmentCenter);
        currentRotation += finalAngle;
        wheel.style.transform = `rotate(${currentRotation}deg)`;
        labels.style.transform = `rotate(${currentRotation}deg)`;

        if (window.SFX) {
          SFX.spinStart();
          // ticking sounds during spin
          let t = 0;
          const tickInt = setInterval(() => {
            SFX.spinTick();
            t += 100;
            if (t > 4000) clearInterval(tickInt);
          }, 120);
        }

        setTimeout(() => {
          if (window.SFX) SFX.win(prize.amount >= 100);
          confetti(prize.amount >= 100 ? 180 : 80);
          resultSlot.innerHTML = `<div class="wheel-result">Вы выиграли ${prize.label}!</div>`;
          setTimeout(refreshStatus, 600);
        }, 4600);
      } catch (ex) {
        statusEl.textContent = ex.message;
      }
    });
  </script>
</body>
</html>
