<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Колесо фортуны — Spinly</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="header-slot"></div>

  <main class="container">
    <div class="wheel-page">
      <h1>Колесо фортуны</h1>
      <p class="lead">Бесплатное вращение раз в 24 часа. Удача гарантирована — выигрыш есть в каждом секторе.</p>

      <div class="wheel-container">
        <div class="wheel-pointer"></div>
        <div class="wheel" id="wheel"></div>
        <div class="wheel-labels" id="wheel-labels"></div>
        <div class="wheel-center"></div>
      </div>

      <button class="btn primary lg" id="spin-btn">Крутить колесо</button>
      <div class="wheel-status" id="status"></div>
      <div id="result-slot"></div>
    </div>
  </main>

  <div id="footer-slot"></div>
  <script src="sounds.js"></script>
  <script src="app.js"></script>
  <script>
    if (!requireAuth()) { /* redirects */ }

    const wheel = document.getElementById("wheel");
    const labels = document.getElementById("wheel-labels");
    const spinBtn = document.getElementById("spin-btn");
    const statusEl = document.getElementById("status");
    const resultSlot = document.getElementById("result-slot");

    // Render labels around the wheel.
    // Each label's CENTER lands at the segment center on a circle.
    // Element is positioned via top/left (with translate -50% -50% centering),
    // then rotated by the segment angle so it reads radially outward.
    function renderLabels() {
      labels.innerHTML = "";
      const stageSize = labels.getBoundingClientRect().width || 360;
      const radius = stageSize * 0.34;   // ~34% of wheel size
      WHEEL_PRIZES.forEach((p, i) => {
        const angle = (i * 45) + 22.5;       // segment center, 0 = top, clockwise
        const rad = (angle - 90) * Math.PI / 180;
        const x = Math.cos(rad) * radius;
        const y = Math.sin(rad) * radius;
        const el = document.createElement("div");
        el.className = "wheel-label";
        el.style.top  = `calc(50% + ${y}px)`;
        el.style.left = `calc(50% + ${x}px)`;
        el.style.transform = `translate(-50%, -50%) rotate(${angle}deg)`;
        el.textContent = p.label;
        labels.appendChild(el);
      });
    }
    renderLabels();
    window.addEventListener("resize", renderLabels);

    let currentRotation = 0;
    let countdownTimer = null;

    function fmtTimeLeft(ms) {
      const totalSec = Math.max(0, Math.floor(ms / 1000));
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    }

    function refreshStatus() {
      const status = canSpinWheel();
      if (status.ok) {
        if (status.extra > 0) {
          statusEl.innerHTML = `Доступно <span class="countdown">${status.extra} бонусное вращение</span>`;
        } else {
          statusEl.innerHTML = `Доступно: <span class="countdown">сейчас</span>`;
        }
        spinBtn.disabled = false;
        if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
      } else {
        spinBtn.disabled = true;
        const tick = () => {
          const left = status.nextAt - Date.now();
          if (left <= 0) refreshStatus();
          else statusEl.innerHTML = `Следующее вращение через <span class="countdown">${fmtTimeLeft(left)}</span>`;
        };
        tick();
        if (countdownTimer) clearInterval(countdownTimer);
        countdownTimer = setInterval(tick, 1000);
      }
    }
    refreshStatus();

    spinBtn.addEventListener("click", () => {
      try {
        const { prize, index, summary } = spinWheel();
        renderHeader(); flashBalance();
        spinBtn.disabled = true;
        resultSlot.innerHTML = "";

        // Animation: spin multiple turns + land on segment
        const segmentCenter = index * 45 + 22.5;
        const baseTurns = 6 * 360;
        const target = baseTurns + (360 - segmentCenter);
        // Always add to existing rotation to keep continuity
        const delta = target - (currentRotation % 360);
        currentRotation += (delta >= 0 ? delta : delta + 360) + baseTurns;
        wheel.style.transform = `rotate(${currentRotation}deg)`;
        labels.style.transform = `rotate(${currentRotation}deg)`;

        if (window.SFX) {
          SFX.spinStart();
          let t = 0;
          const tickInt = setInterval(() => {
            SFX.spinTick();
            t += 120;
            if (t > 4000) clearInterval(tickInt);
          }, 120);
        }

        setTimeout(() => {
          const isBig = (prize.type === "money" && prize.amount >= 100) || prize.type !== "money";
          if (window.SFX) SFX.win(isBig);
          confetti(isBig ? 160 : 70);
          resultSlot.innerHTML = `<div class="wheel-result">🎉 ${summary}</div>`;
          setTimeout(refreshStatus, 600);
        }, 4600);
      } catch (ex) {
        statusEl.textContent = ex.message;
      }
    });
  </script>
</body>
</html>
