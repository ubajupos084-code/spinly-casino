<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dice — Spinly</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="header-slot"></div>

  <main class="container">
    <h2 class="section-title">Dice</h2>
    <p style="color: var(--muted); margin: -8px 0 0;">
      Выберите число от 2 до 98 и направление: «Больше» или «Меньше».
      Чем рискованнее цель — тем выше множитель.
    </p>

    <div class="game-layout">
      <!-- Controls -->
      <aside class="panel">
        <h2>Параметры</h2>

        <div class="field">
          <label>Ставка (€)</label>
          <input class="field-input" type="number" id="bet" value="10" min="1" step="1">
          <div class="bet-bar">
            <button class="btn" data-bet="0.5">½</button>
            <button class="btn" data-bet="2">×2</button>
            <button class="btn" data-bet="max">Макс</button>
          </div>
        </div>

        <div class="field">
          <label>Направление</label>
          <div class="dir-toggle">
            <div class="opt active" data-dir="under">⬇ Меньше</div>
            <div class="opt" data-dir="over">⬆ Больше</div>
          </div>
        </div>

        <button class="btn primary full" id="roll-btn">Бросить</button>
        <div class="result" id="result"></div>

        <h2 style="margin-top: 24px;">Текущая ставка</h2>
        <div class="row-2">
          <div class="stat">
            <div class="label">Цель</div>
            <div class="value gold" id="target-stat">50.00</div>
          </div>
          <div class="stat">
            <div class="label">Шанс</div>
            <div class="value" id="chance-stat">49.50%</div>
          </div>
          <div class="stat">
            <div class="label">Множитель</div>
            <div class="value gold" id="mult-stat">1.96×</div>
          </div>
          <div class="stat">
            <div class="label">Возможный выигрыш</div>
            <div class="value green" id="potential-stat">€ 0</div>
          </div>
        </div>
      </aside>

      <!-- Stage -->
      <section>
        <div class="dice-stage">
          <div class="roll-display">
            <div class="roll-value" id="roll-value">—</div>
            <div class="roll-sub" id="roll-sub">Нажмите «Бросить»</div>
          </div>

          <div class="range-bar" id="range-bar">
            <div class="range-fill left" id="range-fill"></div>
            <div class="range-marker" id="range-marker"></div>
            <div class="range-ticks"><span>0</span><span>25</span><span>50</span><span>75</span><span>100</span></div>
          </div>

          <label style="display:block; font-size:13px; color:var(--muted); margin-bottom:6px;">
            Цель: <span id="target-label" style="color:var(--gold); font-weight:700;">50.00</span>
          </label>
          <input type="range" class="slider" id="target-slider" min="2" max="98" step="0.01" value="50">
        </div>
      </section>
    </div>
  </main>

  <div id="footer-slot"></div>
  <script src="sounds.js"></script>
  <script src="app.js"></script>
  <script>
    if (!requireAuth()) { /* redirects */ }

    const HOUSE_EDGE = 0.99; // 1% дому
    const betInput = document.getElementById("bet");
    const rollBtn = document.getElementById("roll-btn");
    const resultEl = document.getElementById("result");
    const slider = document.getElementById("target-slider");
    const targetLabel = document.getElementById("target-label");
    const dirOpts = document.querySelectorAll(".dir-toggle .opt");
    const rangeFill = document.getElementById("range-fill");
    const rangeMarker = document.getElementById("range-marker");
    const rollValue = document.getElementById("roll-value");
    const rollSub = document.getElementById("roll-sub");

    const targetStat = document.getElementById("target-stat");
    const chanceStat = document.getElementById("chance-stat");
    const multStat   = document.getElementById("mult-stat");
    const potentialStat = document.getElementById("potential-stat");

    let direction = "under"; // "under" | "over"

    function setResult(text, type) {
      resultEl.className = "result show " + type;
      resultEl.textContent = text;
    }
    function clearResult() { resultEl.className = "result"; resultEl.textContent = ""; }

    function calc() {
      const target = Number(slider.value);
      const chance = direction === "under" ? target : (100 - target);
      const multiplier = HOUSE_EDGE * 100 / chance;
      const bet = Number(betInput.value) || 0;
      return { target, chance, multiplier, potential: bet * multiplier };
    }

    function renderRange() {
      const target = Number(slider.value);
      const pct = target; // slider is 2..98 -> use raw value as percent on 0..100 bar
      rangeMarker.style.left = `calc(${pct}% - 1.5px)`;

      if (direction === "under") {
        rangeFill.className = "range-fill left";
        rangeFill.style.left = "0";
        rangeFill.style.right = "auto";
        rangeFill.style.width = `${pct}%`;
      } else {
        rangeFill.className = "range-fill right";
        rangeFill.style.right = "0";
        rangeFill.style.left = "auto";
        rangeFill.style.width = `${100 - pct}%`;
      }
    }

    function renderStats() {
      const { target, chance, multiplier, potential } = calc();
      targetLabel.textContent = target.toFixed(2);
      targetStat.textContent = target.toFixed(2);
      chanceStat.textContent = chance.toFixed(2) + "%";
      multStat.textContent = multiplier.toFixed(2) + "×";
      potentialStat.textContent = "€ " + fmt(potential);
    }

    function refresh() {
      renderRange();
      renderStats();
    }

    function roll() {
      clearResult();
      const bet = Number(betInput.value);
      const u = currentUser();
      if (!u) return;
      if (!(bet > 0)) return setResult("Введите корректную ставку", "lose");
      if (bet > u.balance) return setResult("Недостаточно средств", "lose");

      const { target, multiplier } = calc();
      updateBalance(-bet);
      renderHeader();
      flashBalance();
      if (typeof onBet === "function") onBet(bet);

      rollBtn.disabled = true;
      betInput.disabled = true;

      // Quick "rolling" animation
      const ticks = 18;
      let i = 0;
      const interval = setInterval(() => {
        const v = (Math.random() * 100).toFixed(2);
        rollValue.textContent = v;
        rollValue.classList.remove("win", "lose");
        if (window.SFX) SFX.rollTick();
        i++;
        if (i >= ticks) {
          clearInterval(interval);
          finalize();
        }
      }, 50);

      function finalize() {
        const roll = Math.random() * 100;
        const win = direction === "under" ? (roll < target) : (roll > target);
        rollValue.textContent = roll.toFixed(2);
        rollValue.classList.add(win ? "win" : "lose");
        if (window.SFX) SFX.rollStop();

        if (win) {
          const payout = bet * multiplier;
          updateBalance(payout);
          renderHeader();
          flashBalance();
          const profit = payout - bet;
          const bigWin = multiplier >= 3;
          if (window.SFX) setTimeout(() => SFX.win(bigWin), 150);
          if (bigWin) confetti(Math.min(40 + Math.floor(multiplier * 8), 160));
          if (typeof onWin === "function") onWin({ bet, payout, multiplier, game: "dice" });
          rollSub.textContent = `${roll.toFixed(2)} ${direction === "under" ? "<" : ">"} ${target.toFixed(2)} — победа`;
          setResult(`Выигрыш €${fmt(payout)} (+€${fmt(profit)}) при множителе ${multiplier.toFixed(2)}×`, "win");
        } else {
          if (window.SFX) setTimeout(() => SFX.lose(), 150);
          if (typeof onLoss === "function") onLoss({ bet, game: "dice" });
          rollSub.textContent = `${roll.toFixed(2)} ${direction === "under" ? "≥" : "≤"} ${target.toFixed(2)} — мимо`;
          setResult(`Не повезло. Ставка €${fmt(bet)} сгорела.`, "lose");
        }
        rollBtn.disabled = false;
        betInput.disabled = false;
      }
    }

    let lastSliderSound = 0;
    slider.addEventListener("input", () => {
      refresh();
      const now = performance.now();
      if (window.SFX && now - lastSliderSound > 50) {
        SFX.hover();
        lastSliderSound = now;
      }
    });
    betInput.addEventListener("input", renderStats);
    dirOpts.forEach(opt => opt.addEventListener("click", () => {
      direction = opt.dataset.dir;
      dirOpts.forEach(o => o.classList.toggle("active", o === opt));
      refresh();
      if (window.SFX) SFX.click();
    }));

    document.querySelectorAll(".bet-bar .btn").forEach(b => {
      b.addEventListener("click", () => {
        const mode = b.dataset.bet;
        const u = currentUser();
        if (!u) return;
        let v = Number(betInput.value) || 0;
        if (mode === "max") v = u.balance;
        else v = Math.max(1, Math.floor(v * Number(mode)));
        betInput.value = v;
        renderStats();
      });
    });

    rollBtn.addEventListener("click", roll);
    refresh();
  </script>
</body>
</html>
