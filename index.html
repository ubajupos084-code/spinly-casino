<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spinly — Онлайн казино</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="header-slot"></div>

  <main class="container">
    <section class="hero">
      <div class="hero-content" id="hero-content"></div>
      <div class="hero-anim">
        <div class="anim-stage">
          <div class="anim-wheel"></div>
          <div class="anim-hub">SP</div>
          <div class="anim-ball-orbit"><div class="anim-ball"></div></div>

          <div class="orbit o1"><span class="orbit-item">💎</span></div>
          <div class="orbit o2"><span class="orbit-item">7️⃣</span></div>
          <div class="orbit o3"><span class="orbit-item">🎲</span></div>
          <div class="orbit o4"><span class="orbit-item">🃏</span></div>

          <span class="spark s1">✦</span>
          <span class="spark s2">✦</span>
          <span class="spark s3">✦</span>
          <span class="spark s4">✦</span>
        </div>
      </div>
    </section>

    <h2 class="section-title">Игры</h2>
    <div class="games" id="games-grid"></div>
  </main>

  <div id="footer-slot"></div>
  <script src="sounds.js"></script>
  <script src="app.js"></script>
  <script>
    // ---------- Conditional hero rendering ----------
    function renderHero() {
      const u = currentUser();
      const el = document.getElementById("hero-content");
      if (u) {
        const { current, next } = getLevel(u.xp || 0);
        const xp = u.xp || 0;
        const start = current.xp;
        const target = next ? next.xp : current.xp;
        const pct = next ? Math.min(100, ((xp - start) / (target - start)) * 100) : 100;
        const xpLine = next
          ? `${xp.toLocaleString("ru-RU")} <span style="opacity:.5">/</span> ${target.toLocaleString("ru-RU")} XP`
          : `${xp.toLocaleString("ru-RU")} XP · MAX`;
        el.innerHTML = `
          <h1>Добро пожаловать,<br><span>${u.login}</span></h1>
          <p>Все игры открыты. Удачных раундов и крупных множителей сегодня.</p>
          <a class="hero-vip" href="profile.html" title="Открыть профиль">
            <span class="vip-tag">
              <span class="dot" style="background: ${current.color}; color: ${current.color}"></span>
              ${current.name}
            </span>
            <span class="vip-bar"><span class="fill" style="width: ${pct}%"></span></span>
            <span class="vip-xp">${xpLine}</span>
            <span class="vip-cb">+${current.cashback}%</span>
          </a>
        `;
      } else {
        el.innerHTML = `
          <span class="promo-chip">
            <span>Промокод</span>
            <span class="code" id="promo-code" title="Скопировать">NEW2026</span>
            <span>· +5% к первому пополнению</span>
          </span>
          <h1>Добро пожаловать в <span>Spinly</span></h1>
          <p>
            Зарегистрируйтесь за минуту и активируйте промокод
            <strong>NEW2026</strong> — добавит +5% к вашему первому пополнению.
          </p>
          <div class="actions">
            <a class="btn primary" href="account.html?tab=register">Создать аккаунт</a>
          </div>
        `;
        // copy promo code to clipboard
        const codeEl = document.getElementById("promo-code");
        codeEl.addEventListener("click", async () => {
          try { await navigator.clipboard.writeText("NEW2026"); } catch {}
          codeEl.classList.add("copied");
          const orig = codeEl.textContent;
          codeEl.textContent = "Скопировано";
          if (window.SFX) SFX.win();
          setTimeout(() => {
            codeEl.classList.remove("copied");
            codeEl.textContent = orig;
          }, 1400);
        });
      }
    }

    // ---------- Conditional games grid ----------
    function renderGames() {
      const u = currentUser();
      const el = document.getElementById("games-grid");
      const card = (game) => {
        const featuredClass = game.featured ? " featured" : "";
        const hotTag = game.hot ? '<span class="hot-tag">HOT</span>' : "";
        if (game.soon) {
          return `
            <div class="game-card soon${featuredClass}">
              <div class="game-thumb ${game.cls} soon">${game.icon}</div>
              <div class="game-info">
                <h3>${game.title} <span style="color: var(--muted); font-size: 12px;">(скоро)</span></h3>
                <p>${game.desc}</p>
              </div>
            </div>`;
        }
        if (!u) {
          return `
            <a class="game-card locked${featuredClass}" href="account.html?tab=register" title="Создайте аккаунт, чтобы играть">
              <div class="game-thumb ${game.cls}">${game.icon}</div>
              <div class="game-info">
                <h3>${game.title}${hotTag}</h3>
                <p>Доступно после регистрации</p>
              </div>
            </a>`;
        }
        return `
          <a class="game-card${featuredClass}" href="${game.href}">
            <div class="game-thumb ${game.cls}">${game.icon}</div>
            <div class="game-info">
              <h3>${game.title}${hotTag}</h3>
              <p>${game.desc}</p>
            </div>
          </a>`;
      };

      el.innerHTML = [
        { title: "Crash",     cls: "crash",  icon: "🚀",    href: "crash.html",
          desc: "Множитель растёт. Заберите выигрыш до краха.", featured: true, hot: true },
        { title: "Mines",     cls: "mines",  icon: "💣💎",  href: "mines.html",
          desc: "Открывайте поля. Главное — не задеть бомбу." },
        { title: "Plinko",    cls: "plinko", icon: "🟣",    href: "plinko.html",
          desc: "Шарик падает через ряды пегов в слот с множителем." },
        { title: "Слоты",     cls: "slots",  icon: "🎰",    href: "slots.html",
          desc: "Три барабана. Соберите одинаковые символы." },
        { title: "Limbo",     cls: "limbo",  icon: "🎯",    href: "limbo.html",
          desc: "Установите цель и крутите. Поймайте множитель." },
        { title: "Dice",      cls: "dice",   icon: "🎲",    href: "dice.html",
          desc: "Угадайте: больше или меньше выпадет." },
        { title: "Tower",     cls: "tower",  icon: "🗼",    href: "tower.html",
          desc: "Поднимайтесь по башне, обходя бомбы." },
        { title: "HiLo",      cls: "hilo",   icon: "🂡",    href: "hilo.html",
          desc: "Следующая карта будет выше или ниже?" },
        { title: "Blackjack", cls: "bj",     icon: "🃏",    soon: true,
          desc: "Карточная классика — в разработке." },
      ].map(card).join("");
    }

    renderHero();
    renderGames();
  </script>
</body>
</html>
